services:
  # Aplicação Laravel (PHP + Node)
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        APP_ENV: ${APP_ENV}
        UID: ${HOST_UID}
        GID: ${HOST_GID}
    container_name: hericarealtor_app
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${APP_PORT}:9000"
      - "${VITE_PORT}:5173"
    networks:
      - hericarealtor-network

  # Nginx proxy
  nginx:
    image: nginx:alpine
    container_name: hericarealtor_nginx
    ports:
      - "80:80"
    volumes:
      - ./public:/var/www/public
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - hericarealtor-network

  # PostgreSQL
  db:
    image: postgres:15
    container_name: hericarealtor_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5410:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - hericarealtor-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - hericarealtor-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO
  minio:
    image: minio/minio
    container_name: hericarealtor_minio
    command: server --console-address ":9001" /data
    environment:
      MINIO_ROOT_USER: "${AWS_ACCESS_KEY_ID}"
      MINIO_ROOT_PASSWORD: "${AWS_SECRET_ACCESS_KEY}"
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - minio_data:/data
    networks:
      - hericarealtor-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO client para criar bucket
  minio-mc:
    image: minio/mc
    container_name: hericarealtor_minio-mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set minio http://minio:9000 ${AWS_ACCESS_KEY_ID} ${AWS_SECRET_ACCESS_KEY} --api S3v4;
      /usr/bin/mc mb minio/${AWS_BUCKET} --ignore-existing;
      /usr/bin/mc ls minio;
      exit 0;
      "
    networks:
      - hericarealtor-network

  # Listing Updater (Python scraper — mesma DB)
  listing-updater:
    build:
      context: ./jobs/listings-updater
      dockerfile: Dockerfile
    container_name: hericarealtor_listing_updater
    env_file:
      - ./jobs/listings-updater/.env
    environment:
      DATABASE_URL: "postgresql://${DB_USERNAME}:${DB_PASSWORD}@db:5432/${DB_DATABASE}"
    depends_on:
      db:
        condition: service_healthy
    shm_size: 2gb
    networks:
      - hericarealtor-network

volumes:
  pgdata:
  minio_data:

networks:
  hericarealtor-network:
    driver: bridge