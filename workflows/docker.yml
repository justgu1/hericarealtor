name: Build & Push Docker Image

on:
  push:
    branches: [main]
    paths-ignore:
      - 'jobs/**'
      - '.github/workflows/docker-listings-updater.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: justgu1/hericarealtor

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update image tag in infra repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          SHA_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          git clone https://x-access-token:${GH_PAT}@github.com/justgu1/infra.git /tmp/infra
          cd /tmp/infra
          git config user.email "ci@hericarealtor.com"
          git config user.name "GitHub Actions"
          sed -i "s|tag:.*|tag: ${SHA_TAG}|" apps/hericarealtor/values.yaml
          git diff --quiet && echo "No changes" && exit 0
          git add apps/hericarealtor/values.yaml
          git commit -m "chore(hericarealtor): update image tag to ${SHA_TAG} [ci skip]"
          git push
