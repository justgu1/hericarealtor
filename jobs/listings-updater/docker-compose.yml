services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hericarealtor_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d hericarealtor_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  scraper:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
